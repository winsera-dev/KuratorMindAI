description = "Interactive command center for managing multiple phases from one terminal"
prompt = "<objective>\nSingle-terminal command center for managing a milestone. Shows a dashboard of all phases with visual status indicators, recommends optimal next actions, and dispatches work — discuss runs inline, plan/execute run as background agents.\n\nDesigned for power users who want to parallelize work across phases from one terminal: discuss a phase while another plans or executes in the background.\n\n**Creates/Updates:**\n- No files created directly — dispatches to existing GSD commands via Skill() and background Task agents.\n- Reads `.planning/STATE.md`, `.planning/ROADMAP.md`, phase directories for status.\n\n**After:** User exits when done managing, or all phases complete and milestone lifecycle is suggested.\n</objective>\n\n<execution_context>\n@/Users/muflihiskandar/Products - Winsera/kuratormind-ai/.agent/skills/gsd/get-shit-done/workflows/manager.md\n@/Users/muflihiskandar/Products - Winsera/kuratormind-ai/.agent/skills/gsd/get-shit-done/references/ui-brand.md\n</execution_context>\n\n<context>\nNo arguments required. Requires an active milestone with ROADMAP.md and STATE.md.\n\nProject context, phase list, dependencies, and recommendations are resolved inside the workflow using `gsd-tools.cjs init manager`. No upfront context loading needed.\n</context>\n\n<process>\nExecute the manager workflow from @/Users/muflihiskandar/Products - Winsera/kuratormind-ai/.agent/skills/gsd/get-shit-done/workflows/manager.md end-to-end.\nMaintain the dashboard refresh loop until the user exits or all phases complete.\n</process>"
