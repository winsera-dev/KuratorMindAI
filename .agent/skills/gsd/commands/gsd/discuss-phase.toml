description = "Gather phase context through adaptive questioning before planning. Use --auto to skip interactive questions (Claude picks recommended defaults). Use --chain for interactive discuss followed by automatic plan+execute. Use --power for bulk question generation into a file-based UI (answer at your own pace)."
prompt = "<objective>\nExtract implementation decisions that downstream agents need — researcher and planner will use CONTEXT.md to know what to investigate and what choices are locked.\n\n**How it works:**\n1. Load prior context (PROJECT.md, REQUIREMENTS.md, STATE.md, prior CONTEXT.md files)\n2. Scout codebase for reusable assets and patterns\n3. Analyze phase — skip gray areas already decided in prior phases\n4. Present remaining gray areas — user selects which to discuss\n5. Deep-dive each selected area until satisfied\n6. Create CONTEXT.md with decisions that guide research and planning\n\n**Output:** `{phase_num}-CONTEXT.md` — decisions clear enough that downstream agents can act without asking the user again\n</objective>\n\n<execution_context>\n@/Users/muflihiskandar/Products - Winsera/kuratormind-ai/.agent/skills/gsd/get-shit-done/workflows/discuss-phase.md\n@/Users/muflihiskandar/Products - Winsera/kuratormind-ai/.agent/skills/gsd/get-shit-done/workflows/discuss-phase-assumptions.md\n@/Users/muflihiskandar/Products - Winsera/kuratormind-ai/.agent/skills/gsd/get-shit-done/workflows/discuss-phase-power.md\n@/Users/muflihiskandar/Products - Winsera/kuratormind-ai/.agent/skills/gsd/get-shit-done/templates/context.md\n</execution_context>\n\n<runtime_note>\n**Copilot (VS Code):** Use `vscode_askquestions` wherever this workflow calls `AskUserQuestion`. They are equivalent — `vscode_askquestions` is the VS Code Copilot implementation of the same interactive question API.\n</runtime_note>\n\n<context>\nPhase number: $ARGUMENTS (required)\n\nContext files are resolved in-workflow using `init phase-op` and roadmap/state tool calls.\n</context>\n\n<process>\n**Mode routing:**\n```bash\nDISCUSS_MODE=$(node \"/Users/muflihiskandar/Products - Winsera/kuratormind-ai/.agent/skills/gsd/get-shit-done/bin/gsd-tools.cjs\" config-get workflow.discuss_mode 2>/dev/null || echo \"discuss\")\n```\n\nIf `DISCUSS_MODE` is `\"assumptions\"`: Read and execute @/Users/muflihiskandar/Products - Winsera/kuratormind-ai/.agent/skills/gsd/get-shit-done/workflows/discuss-phase-assumptions.md end-to-end.\n\nIf `DISCUSS_MODE` is `\"discuss\"` (or unset, or any other value): Read and execute @/Users/muflihiskandar/Products - Winsera/kuratormind-ai/.agent/skills/gsd/get-shit-done/workflows/discuss-phase.md end-to-end.\n\n**MANDATORY:** The execution_context files listed above ARE the instructions. Read the workflow file BEFORE taking any action. The objective and success_criteria sections in this command file are summaries — the workflow file contains the complete step-by-step process with all required behaviors, config checks, and interaction patterns. Do not improvise from the summary.\n</process>\n\n<success_criteria>\n- Prior context loaded and applied (no re-asking decided questions)\n- Gray areas identified through intelligent analysis\n- User chose which areas to discuss\n- Each selected area explored until satisfied\n- Scope creep redirected to deferred ideas\n- CONTEXT.md captures decisions, not vague vision\n- User knows next steps\n</success_criteria>"
