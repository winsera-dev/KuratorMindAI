description = "Add an idea to the backlog parking lot (999.x numbering)"
prompt = "<objective>\nAdd a backlog item to the roadmap using 999.x numbering. Backlog items are\nunsequenced ideas that aren't ready for active planning — they live outside\nthe normal phase sequence and accumulate context over time.\n</objective>\n\n<process>\n\n1. **Read ROADMAP.md** to find existing backlog entries:\n   ```bash\n   cat .planning/ROADMAP.md\n   ```\n\n2. **Find next backlog number:**\n   ```bash\n   NEXT=$(node \"/Users/muflihiskandar/Products - Winsera/kuratormind-ai/.agent/skills/gsd/get-shit-done/bin/gsd-tools.cjs\" phase next-decimal 999 --raw)\n   ```\n   If no 999.x phases exist, start at 999.1.\n\n3. **Create the phase directory:**\n   ```bash\n   SLUG=$(node \"/Users/muflihiskandar/Products - Winsera/kuratormind-ai/.agent/skills/gsd/get-shit-done/bin/gsd-tools.cjs\" generate-slug \"$ARGUMENTS\" --raw)\n   mkdir -p \".planning/phases/${NEXT}-${SLUG}\"\n   touch \".planning/phases/${NEXT}-${SLUG}/.gitkeep\"\n   ```\n\n4. **Add to ROADMAP.md** under a `## Backlog` section. If the section doesn't exist, create it at the end:\n\n   ```markdown\n   ## Backlog\n\n   ### Phase {NEXT}: {description} (BACKLOG)\n\n   **Goal:** [Captured for future planning]\n   **Requirements:** TBD\n   **Plans:** 0 plans\n\n   Plans:\n   - [ ] TBD (promote with /gsd-review-backlog when ready)\n   ```\n\n5. **Commit:**\n   ```bash\n   node \"/Users/muflihiskandar/Products - Winsera/kuratormind-ai/.agent/skills/gsd/get-shit-done/bin/gsd-tools.cjs\" commit \"docs: add backlog item ${NEXT} — ${ARGUMENTS}\" --files .planning/ROADMAP.md \".planning/phases/${NEXT}-${SLUG}/.gitkeep\"\n   ```\n\n6. **Report:**\n   ```\n   ## 📋 Backlog Item Added\n\n   Phase {NEXT}: {description}\n   Directory: .planning/phases/{NEXT}-{slug}/\n\n   This item lives in the backlog parking lot.\n   Use /gsd-discuss-phase {NEXT} to explore it further.\n   Use /gsd-review-backlog to promote items to active milestone.\n   ```\n\n</process>\n\n<notes>\n- 999.x numbering keeps backlog items out of the active phase sequence\n- Phase directories are created immediately, so /gsd-discuss-phase and /gsd-plan-phase work on them\n- No `Depends on:` field — backlog items are unsequenced by definition\n- Sparse numbering is fine (999.1, 999.3) — always uses next-decimal\n</notes>"
