description = "Execute a quick task with GSD guarantees (atomic commits, state tracking) but skip optional agents"
prompt = "<objective>\nExecute small, ad-hoc tasks with GSD guarantees (atomic commits, STATE.md tracking).\n\nQuick mode is the same system with a shorter path:\n- Spawns gsd-planner (quick mode) + gsd-executor(s)\n- Quick tasks live in `.planning/quick/` separate from planned phases\n- Updates STATE.md \"Quick Tasks Completed\" table (NOT ROADMAP.md)\n\n**Default:** Skips research, discussion, plan-checker, verifier. Use when you know exactly what to do.\n\n**`--discuss` flag:** Lightweight discussion phase before planning. Surfaces assumptions, clarifies gray areas, captures decisions in CONTEXT.md. Use when the task has ambiguity worth resolving upfront.\n\n**`--full` flag:** Enables the complete quality pipeline — discussion + research + plan-checking + verification. One flag for everything.\n\n**`--validate` flag:** Enables plan-checking (max 2 iterations) and post-execution verification only. Use when you want quality guarantees without discussion or research.\n\n**`--research` flag:** Spawns a focused research agent before planning. Investigates implementation approaches, library options, and pitfalls for the task. Use when you're unsure of the best approach.\n\nGranular flags are composable: `--discuss --research --validate` gives the same result as `--full`.\n</objective>\n\n<execution_context>\n@/Users/muflihiskandar/Products - Winsera/kuratormind-ai/.agent/skills/gsd/get-shit-done/workflows/quick.md\n</execution_context>\n\n<context>\n$ARGUMENTS\n\nContext files are resolved inside the workflow (`init quick`) and delegated via `<files_to_read>` blocks.\n</context>\n\n<process>\nExecute the quick workflow from @/Users/muflihiskandar/Products - Winsera/kuratormind-ai/.agent/skills/gsd/get-shit-done/workflows/quick.md end-to-end.\nPreserve all workflow gates (validation, task description, planning, execution, state updates, commits).\n</process>"
