<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="primary-grad" x1="0" y1="0" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
  </defs>
  
  <!-- Neural Icon -->
  <g transform="translate(10, 10)">
    <!-- Connections -->
    <path d="M 20 20 V 80" stroke="#3B82F6" stroke-width="4.5" stroke-linecap="round" opacity="0.3" />
    <path d="M 20 50 H 45" stroke="#3B82F6" stroke-width="4.5" stroke-linecap="round" opacity="0.3" />
    <path d="M 45 50 L 70 20" stroke="#3B82F6" stroke-width="4.5" stroke-linecap="round" opacity="0.3" />
    <path d="M 45 50 L 70 80" stroke="#3B82F6" stroke-width="4.5" stroke-linecap="round" opacity="0.3" />
    
    <!-- Nodes (Glowed) -->
    <circle cx="20" cy="20" r="10" fill="url(#primary-grad)" filter="url(#glow-blue)" />
    <circle cx="20" cy="50" r="10" fill="url(#primary-grad)" filter="url(#glow-blue)" />
    <circle cx="20" cy="80" r="10" fill="url(#primary-grad)" filter="url(#glow-blue)" />
    <circle cx="45" cy="50" r="10" fill="url(#primary-grad)" filter="url(#glow-blue)" />
    <circle cx="70" cy="20" r="10" fill="url(#primary-grad)" filter="url(#glow-blue)" />
    <circle cx="70" cy="80" r="10" fill="url(#primary-grad)" filter="url(#glow-blue)" />
  </g>
</svg>
